name: Cloud Build ESP32 Router

on:
  workflow_dispatch: # Biar tombol "Run Workflow" muncul di web GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    container: espressif/idf:release-v4.4

    steps:
      - name: Checkout Repo beserta Submodules
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Jinakkan Aturan & Upgrade Component Manager
        run: |
          . /opt/esp/idf/export.sh
          # 1. Edit buku aturan ESP-IDF agar menerima component-manager versi baru (ubah ~=1.2 jadi >=1.2)
          sed -i 's/idf-component-manager~=1.2/idf-component-manager>=1.2/g' /opt/esp/idf/requirements.txt
          
          # 2. Upgrade component manager ke versi terbaru agar paham chip esp32c5
          python -m pip install --upgrade idf-component-manager

      - name: Build Firmware
        run: |
          . /opt/esp/idf/export.sh
          # Menghindari error konfigurasi kosong
          if [ -f sdkconfig.defaults ]; then
            idf.py defconfig
          fi
          idf.py build

      - name: Upload Hasil Build ke GitHub
        uses: actions/upload-artifact@v4
        with:
          name: esp32-nat-router-binaries
          path: |
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            build/esp32_nat_router.bin
            build/ota_data_initial.bin
